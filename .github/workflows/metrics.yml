name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Base Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-base.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: amarzeus
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

      - name: Language Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: amarzeus
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8

      - name: Achievement Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-achievements.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: amarzeus
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

      - name: WakaTime Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: amarzeus
          template: classic
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, languages, editors, os
